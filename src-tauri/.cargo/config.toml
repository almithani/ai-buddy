# Build environment for macOS with Xcode CLT (no full Xcode install).
# C++ standard library headers live inside the SDK on macOS 26, not in
# the CLT's base include path, so we point CXXFLAGS at them explicitly.
[env]
MACOSX_DEPLOYMENT_TARGET = "15.0"
SDKROOT = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
CXXFLAGS = "-isysroot /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk -I/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/include/c++/v1"
